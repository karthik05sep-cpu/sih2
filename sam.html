```html
<!DOCTYPE html>
<html>
<head>
    <title>Loan Utilization Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:20px;
        }

        .container{
            max-width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input,select,button{
            width:100%;
            padding:10px;
            margin-top:10px;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:15px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Loan Utilization Tracker</h2>

<h3>Create </h3>

<input type="number" id="loanAmount" placeholder="Loan Amount">

<select id="purpose">
<option>Education</option>
<option>Business</option>
<option>Home</option>
</select>

<button onclick="createLoan()">Create Loan</button>

<hr>

<h3>Add Spending</h3>

<input type="number" id="spendAmount" placeholder="Amount Spent">

<select id="category">
<option>Books</option>
<option>Business Expense</option>
<option>Shopping</option>
<option>Other</option>
</select>

<button onclick="addSpending()">Add Spending</button>

<div class="result" id="output"></div>

</div>

<script>

async function createLoan(){

    const loanAmount = document.getElementById("loanAmount").value
    const purpose = document.getElementById("purpose").value

    const response = await fetch("http://localhost:3000/loan",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            loanAmount: parseInt(loanAmount),
            purpose: purpose
        })
    })

    const data = await response.json()

    document.getElementById("output").innerHTML = "Loan Created Successfully"
}


async function addSpending(){

    const amount = document.getElementById("spendAmount").value
    const category = document.getElementById("category").value

    const response = await fetch("http://localhost:3000/spend",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            amount: parseInt(amount),
            category: category
        })
    })

    const data = await response.json()

    document.getElementById("output").innerHTML =
        "Total Spent: ₹ " + data.totalSpent +
        "<br>Utilization: " + data.utilization.toFixed(2) + "%" +
        "<br>" + data.warning
}

</script>

</body>
</html>
